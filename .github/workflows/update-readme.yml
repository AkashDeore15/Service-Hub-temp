name: Auto-Generate README

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  update-readme:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Update README.md
        run: |
          # 1. Get the last commit message
          LAST_MSG=$(git log -1 --pretty=format:"%s")
          
          # 2. Create the temporary header
          echo "### 📢 Latest Project Update" > new_header.md
          echo "> **Change:** ${LAST_MSG}" >> new_header.md
          echo "> **Date:** $(date)" >> new_header.md
          echo "---" >> new_header.md
          echo "" >> new_header.md

          if [ -f README.md ]; then
            # 3. Remove any OLD update header (everything between the header and the '---' line)
            # This keeps the README clean so only the VERY latest update shows.
            sed -i '/### 📢 Latest Project Update/,/---/d' README.md
            
            # 4. Combine: [New Header] + [Rest of existing README]
            cat new_header.md README.md > temp_readme.md
            mv temp_readme.md README.md
          else
            mv new_header.md README.md
          fi

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || (git commit -m "docs: update latest change header [skip ci]" && git push)
